<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聯華電子 - 國際策略管理期末專案</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 玻璃擬物化特效 */
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.5s ease, border-color 0.5s ease;
        }
        .light-mode .glass-panel {
            background: rgba(255, 255, 255, 0.75) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            backdrop-filter: blur(12px);
        }
        
        .glass-card {
            background: rgba(31, 41, 55, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .light-mode .glass-card, .light-mode .carousel-item {
            background: rgba(204, 238, 255, 0.6) !important;
            border-color: rgba(59, 130, 246, 0.15) !important;
            color: #111827 !important;
            backdrop-filter: blur(8px);
        }
        .glass-card:hover {
            background: rgba(31, 41, 55, 0.6);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
        }
        .light-mode .glass-card:hover, .light-mode .carousel-item:hover {
            background: rgba(179, 226, 255, 0.85) !important;
            border-color: rgba(59, 130, 246, 0.3) !important;
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.15) !important;
        }
        
        .icon-wrapper {
            background-color: rgba(59, 130, 246, 0.1);
            transition: all 0.3s ease;
        }
        .light-mode .icon-wrapper {
            background-color: rgba(255, 255, 255, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px -2px rgba(59, 130, 246, 0.1);
        }
        
        .wafer-bg {
            background: radial-gradient(circle at 50% 50%, rgba(17, 24, 39, 0.6) 0%, rgba(11, 15, 25, 1) 100%);
            transition: background 0.5s ease;
        }
        .light-mode.wafer-bg {
            background: #ffffff !important; 
        }
        
        .light-mode .bg-grid-svg { display: none !important; }

        .light-mode .text-white:not(button .text-white):not(button) { color: #111827 !important; }
        .light-mode .text-gray-300:not(button .text-gray-300):not(button) { color: #374151 !important; }
        .light-mode .text-gray-400:not(button .text-gray-400):not(button) { color: #4b5563 !important; }
        .light-mode .text-gray-500:not(button .text-gray-500):not(button) { color: #6b7280 !important; }
        
        .light-mode .text-blue-400 { color: #1d4ed8 !important; }
        .light-mode .text-indigo-400 { color: #4338ca !important; }
        .light-mode .text-purple-400 { color: #6d28d9 !important; }
        .light-mode .text-emerald-400 { color: #047857 !important; }
        .light-mode .text-amber-400 { color: #b45309 !important; }
        .light-mode .text-cyan-400 { color: #0369a1 !important; }
        .light-mode .text-pink-400 { color: #be185d !important; }
        
        .light-mode button.text-gray-400, .light-mode button.text-gray-300 { color: #4b5563 !important; }
        .light-mode button:hover.text-gray-400, .light-mode button:hover.text-gray-300 { color: #111827 !important; background-color: rgba(0,0,0,0.05) !important; }
        .light-mode .border-gray-800, .light-mode .border-gray-800\/50, .light-mode .border-gray-800\/80 { border-color: rgba(0,0,0,0.1) !important; }
        .light-mode .bg-gray-800, .light-mode .bg-gray-800\/50 { background-color: #e5e7eb !important; }
        
        .light-mode .bg-gray-950\/40, .light-mode .bg-gray-950\/20, .light-mode .bg-gray-900\/30, .light-mode .bg-gray-900\/80 {
            background-color: rgba(255, 255, 255, 0.7) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(8px);
        }
        .light-mode .bg-\[\#070a13\], .light-mode .bg-\[\#070a13\]\/90 { background-color: #ffffff !important; }
        .light-mode .bg-\[\#090d16\]\/98 { background-color: #ffffff !important; }
        
        .light-mode button.bg-gradient-to-r, .light-mode button.bg-gradient-to-r span, .light-mode button.bg-gradient-to-r svg {
            color: #ffffff !important;
        }
        
        .carousel-container {
            perspective: 1200px;
            transform-style: preserve-3d;
            touch-action: pan-y; 
        }
        .carousel-item {
            transition: transform 0.7s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.7s ease, border-color 0.4s ease, background-color 0.5s ease;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
        .page-transition {
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.6s ease;
        }

        /* 內容淡入動畫 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body id="app-body" class="wafer-bg h-[100dvh] w-screen flex flex-col justify-between overflow-hidden">

    <!-- 靜態科技背景線條 -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden opacity-10 bg-grid-svg">
        <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
                    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="currentColor" stroke-width="1"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" class="text-white light-mode-text" />
            <circle cx="50%" cy="50%" r="35%" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="10, 15" class="text-blue-500" />
            <circle cx="50%" cy="50%" r="20%" fill="none" stroke="currentColor" stroke-width="1" class="text-blue-400" />
        </svg>
    </div>

    <!-- 頁頂導覽列 -->
    <header class="relative z-30 w-full px-4 lg:px-16 py-3 flex items-center justify-between border-b border-gray-800/50 light-mode-border glass-panel shrink-0">
        <div class="flex items-center space-x-4">
            <button onclick="toggleSidebar()" class="p-2 text-gray-400 hover:text-white dark:hover:text-white hover:bg-gray-800/60 rounded-xl transition-all focus:outline-none flex items-center justify-center border border-gray-800 light-mode-btn-border hover:border-gray-700">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <div class="flex items-center space-x-3 cursor-pointer" onclick="goToHome()">
                <div class="w-9 h-9 bg-white rounded-md flex items-center justify-center p-1 shadow-lg shadow-blue-500/20">
                    <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#0033a0">UMC</text>
                    </svg>
                </div>
                <span class="text-lg font-bold tracking-wider text-white light-mode-title">聯華電子</span>
            </div>
        </div>
        
        <div class="flex items-center space-x-1 md:space-x-3">
            <button onclick="speakCurrentCard()" class="p-2 text-gray-400 hover:text-white hover:bg-gray-800/60 rounded-xl transition-all focus:outline-none flex items-center justify-center border border-transparent hover:border-gray-700" title="語音導覽">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2l4 4V4L9 8H7a2 2 0 00-2 2z"></path></svg>
            </button>
            <button onclick="toggleDarkMode()" class="p-2 text-gray-400 hover:text-white hover:bg-gray-800/60 rounded-xl transition-all focus:outline-none flex items-center justify-center border border-transparent hover:border-gray-700" id="dark-mode-toggle" title="明暗模式">
                <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </button>
            <button onclick="toggleLanguage()" class="px-3 py-1.5 text-xs font-bold text-gray-400 hover:text-white hover:bg-gray-800/60 rounded-xl transition-all focus:outline-none border border-transparent hover:border-gray-700 tracking-wider" id="lang-toggle-btn" title="Language">
                中/EN
            </button>
        </div>
    </header>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- 側邊選單 -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-[#090d16]/98 border-r border-gray-800/80 light-mode-sidebar z-50 transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col justify-between shadow-2xl shadow-black/80">
        <div class="p-6 overflow-y-auto no-scrollbar flex-1">
            <div class="flex items-center justify-between border-b border-gray-800 light-mode-border pb-5 mb-6">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-white rounded-md flex items-center justify-center p-0.5 shadow-sm">
                        <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                            <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#0033a0">UMC</text>
                        </svg>
                    </div>
                    <span class="text-base font-bold tracking-wider text-white light-mode-title" data-zh="導覽選單" data-en="Navigation">導覽選單</span>
                </div>
                <button onclick="toggleSidebar()" class="p-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800 transition-colors focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <nav class="space-y-2">
                <!-- 1. 公司介紹 -->
                <div class="space-y-1 relative" onmouseenter="handleHover(true, 'com')" onmouseleave="handleHover(false, 'com')">
                    <div class="flex items-center justify-between w-full px-4 py-3 rounded-xl hover:bg-gray-800/40 light-mode-hover text-gray-300 hover:text-white font-medium transition-all text-left cursor-pointer">
                        <div class="flex items-center space-x-3 flex-1" onclick="jumpToSection(1)">
                            <svg class="w-5 h-5 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1M9 11h1"></path></svg>
                            <span class="font-bold" data-zh="公司介紹" data-en="Company Introduction">公司介紹</span>
                        </div>
                        <div class="pl-4 py-1" onclick="toggleMenu('com')">
                            <svg id="chevron-com" class="w-4 h-4 text-gray-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <div id="submenu-com" class="overflow-hidden transition-all duration-500 max-h-0">
                        <div class="pl-12 pr-4 py-1 space-y-1.5 border-l-2 border-indigo-500/50 ml-6 mb-2">
                            <button onclick="jumpToSection(1, 'com-overview')" class="flex items-center text-xs text-gray-400 hover:text-indigo-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="公司概況" data-en="Overview">公司概況</button>
                            <button onclick="jumpToSection(1, 'com-history')" class="flex items-center text-xs text-gray-400 hover:text-indigo-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="歷史沿革" data-en="History">歷史沿革</button>
                            <button onclick="jumpToSection(1, 'com-locations')" class="flex items-center text-xs text-gray-400 hover:text-indigo-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="服務據點" data-en="Service Locations">服務據點</button>
                            <button onclick="jumpToSection(1, 'com-org')" class="flex items-center text-xs text-gray-400 hover:text-indigo-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="組織架構" data-en="Organization">組織架構</button>
                            <button onclick="jumpToSection(1, 'com-finance')" class="flex items-center text-xs text-gray-400 hover:text-indigo-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="財務績效" data-en="Financial Performance">財務績效</button>
                        </div>
                    </div>
                </div>

                <!-- 2. 市場分析 -->
                <div class="space-y-1 relative" onmouseenter="handleHover(true, 'market')" onmouseleave="handleHover(false, 'market')">
                    <div class="flex items-center justify-between w-full px-4 py-3 rounded-xl hover:bg-gray-800/40 light-mode-hover text-gray-300 hover:text-white font-medium transition-all text-left cursor-pointer">
                        <div class="flex items-center space-x-3 flex-1" onclick="jumpToSection(2)">
                            <svg class="w-5 h-5 text-purple-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            <span class="font-bold" data-zh="市場分析" data-en="Market Analysis">市場分析</span>
                        </div>
                        <div class="pl-4 py-1" onclick="toggleMenu('market')">
                            <svg id="chevron-market" class="w-4 h-4 text-gray-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <div id="submenu-market" class="overflow-hidden transition-all duration-500 max-h-0">
                        <div class="pl-12 pr-4 py-1 space-y-1.5 border-l-2 border-purple-500/50 ml-6 mb-2">
                            <button onclick="jumpToSection(2, 'market-bmc')" class="flex items-center text-xs text-gray-400 hover:text-purple-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="商業模式九宮格" data-en="Business Model Canvas">商業模式九宮格</button>
                            <button onclick="jumpToSection(2, 'market-trend')" class="flex items-center text-xs text-gray-400 hover:text-purple-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="產業環境與市場趨勢" data-en="Industry & Market Trends">產業環境與市場趨勢</button>
                            <button onclick="jumpToSection(2, 'market-competitor')" class="flex items-center text-xs text-gray-400 hover:text-purple-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="策略群組-競爭者分析" data-en="Strategic Group Analysis">策略群組-競爭者分析</button>
                            <button onclick="jumpToSection(2, 'market-dynamic')" class="flex items-center text-xs text-gray-400 hover:text-purple-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="動態競爭分析" data-en="Dynamic Competition">動態競爭分析</button>
                            <button onclick="jumpToSection(2, 'market-pestel')" class="flex items-center text-xs text-gray-400 hover:text-purple-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="PESTEL" data-en="PESTEL Analysis">PESTEL</button>
                            <button onclick="jumpToSection(2, 'market-six-forces')" class="flex items-center text-xs text-gray-400 hover:text-purple-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="六力分析" data-en="Six Forces Analysis">六力分析</button>
                        </div>
                    </div>
                </div>

                <!-- 3. 資源分析 -->
                <div class="space-y-1 relative" onmouseenter="handleHover(true, 'resource')" onmouseleave="handleHover(false, 'resource')">
                    <div class="flex items-center justify-between w-full px-4 py-3 rounded-xl hover:bg-gray-800/40 light-mode-hover text-gray-300 hover:text-white font-medium transition-all text-left cursor-pointer">
                        <div class="flex items-center space-x-3 flex-1" onclick="jumpToSection(3)">
                            <svg class="w-5 h-5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622"></path></svg>
                            <span class="font-bold" data-zh="資源分析" data-en="Resource Analysis">資源分析</span>
                        </div>
                        <div class="pl-4 py-1" onclick="toggleMenu('resource')">
                            <svg id="chevron-resource" class="w-4 h-4 text-gray-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <div id="submenu-resource" class="overflow-hidden transition-all duration-500 max-h-0">
                        <div class="pl-12 pr-4 py-1 space-y-1.5 border-l-2 border-emerald-500/50 ml-6 mb-2">
                            <button onclick="jumpToSection(3, 'res-allocation')" class="flex items-center text-xs text-gray-400 hover:text-emerald-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="資源配置分析" data-en="Resource Allocation">資源配置分析</button>
                            <button onclick="jumpToSection(3, 'res-value-chain')" class="flex items-center text-xs text-gray-400 hover:text-emerald-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="企業活動價值鏈" data-en="Value Chain">企業活動價值鏈</button>
                            <button onclick="jumpToSection(3, 'res-vrin')" class="flex items-center text-xs text-gray-400 hover:text-emerald-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="VR-IN特質" data-en="VR-IN Attributes">VR-IN特質</button>
                            <button onclick="jumpToSection(3, 'res-core')" class="flex items-center text-xs text-gray-400 hover:text-emerald-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="核心能耐" data-en="Core Competency">核心能耐</button>
                            <button onclick="jumpToSection(3, 'res-complementary')" class="flex items-center text-xs text-gray-400 hover:text-emerald-400 py-1.5 transition-all duration-300 w-full text-left font-medium hover:-translate-y-1 hover:scale-105 transform origin-left" data-zh="互補性資產" data-en="Complementary Assets">互補性資產</button>
                        </div>
                    </div>
                </div>

                <!-- 4. 成長策略 -->
                <div class="space-y-1 relative" onmouseenter="handleHover(true, 'growth')" onmouseleave="handleHover(false, 'growth')">
                    <div class="flex items-center justify-between w-full px-4 py-3 rounded-xl hover:bg-gray-800/40 light-mode-hover text-gray-300 hover:text-white font-medium transition-all text-left cursor-pointer">
                        <div class="flex items-center space-x-3 flex-1" onclick="jumpToSection(4)">
                            <svg class="w-5 h-5 text-amber-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                            <span class="font-bold" data-zh="成長策略" data-en="Growth Strategy">成長策略</span>
                        </div>
                        <div class="pl-4 py-1" onclick="toggleMenu('growth')">
                            <svg id="chevron-growth" class="w-4 h-4 text-gray-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>

        // 動態渲染首頁 3D 卡片 (支援中英文本動態變更、自適應字級與副標題開關)

                const cardHtml = `

                         class="carousel-item absolute w-[65vw] sm:w-[280px] md:w-[320px] p-4 md:p-6 rounded-2xl glass-panel text-center cursor-pointer flex flex-col justify-center items-center h-[25vh] max-h-[220px] min-h-[160px]">
                        <div class="flex justify-center mb-2 md:mb-4"><div class="p-3 md:p-4 icon-wrapper rounded-full">${item.icon}</div></div>

                            <h3 class="${titleFontSizeClass} text-white light-mode-title transition-all duration-300">${titleText}</h3>

                track.innerHTML += cardHtml;

            updateCarousel();
            setupTouchGestures();

        // 卡片點擊跳轉邏輯 (整合防誤觸)
        let dragOccurred = false;

                dragOccurred = false;
                return;

                enterCurrentSection(); 
            } else {
                setActiveIndex(index);

        // 動態調整卡片 CSS 3D 位置
        function updateCarousel() {
            SECTIONS.forEach((item, index) => {
                const card = document.getElementById(`carousel-item-${index}`);
                if (!card) return;
                let diff = index - activeIndex;
                const total = SECTIONS.length;
                if (diff < -total / 2) diff += total;
                else if (diff > total / 2) diff -= total;

                let transformStyle = '', opacity = 0, zIndex = 0, pointerEvents = 'none';

                if (diff === 0) {
                    transformStyle = 'translateX(0) scale(1.15) translateZ(80px) rotateY(0deg)';
                    opacity = 1; zIndex = 20; pointerEvents = 'auto';
                    card.style.borderColor = 'rgba(59, 130, 246, 0.5)';
                    card.style.boxShadow = '0 15px 35px -10px rgba(59, 130, 246, 0.4)';
                } else if (diff === -1) {
                    transformStyle = 'translateX(-110%) scale(0.8) translateZ(-50px) rotateY(35deg)';
                    opacity = 0.5; zIndex = 10; pointerEvents = 'auto';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.08)'; card.style.boxShadow = 'none';
                } else if (diff === 1) {
                    transformStyle = 'translateX(110%) scale(0.8) translateZ(-50px) rotateY(-35deg)';
                    opacity = 0.5; zIndex = 10; pointerEvents = 'auto';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.08)'; card.style.boxShadow = 'none';
                } else {
                    transformStyle = diff < 0 
                        ? 'translateX(-220%) scale(0.6) translateZ(-150px) rotateY(55deg)' 
                        : 'translateX(220%) scale(0.6) translateZ(-150px) rotateY(-55deg)';
                    opacity = 0; zIndex = 0; pointerEvents = 'none';
                    card.style.borderColor = 'rgba(255, 255, 255, 0.08)'; card.style.boxShadow = 'none';
                }
                card.style.transform = transformStyle; card.style.opacity = opacity;
                card.style.zIndex = zIndex; card.style.pointerEvents = pointerEvents;
            });
        }

        function setActiveIndex(index) {
            if (index < 0) activeIndex = SECTIONS.length - 1;
            else if (index >= SECTIONS.length) activeIndex = 0;
            else activeIndex = index;
            updateCarousel();
        }

        // 綁定連續切換與滾動、鍵盤事件
        function prevSlide() { setActiveIndex(activeIndex - 1); }
        function nextSlide() { setActiveIndex(activeIndex + 1); }

        let isTouchDevice = false;
        window.addEventListener('touchstart', () => { isTouchDevice = true; }, { passive: true });

        let holdInterval, holdTimeout;
        function startHold(direction, event) {
            if (isTouchDevice && event && event.type === 'mousedown') return;

            if (direction === 'next') nextSlide(); else prevSlide();
            holdTimeout = setTimeout(() => {
                holdInterval = setInterval(() => { if (direction === 'next') nextSlide(); else prevSlide(); }, 400); 
            }, 400);
        }
        function stopHold() { clearTimeout(holdTimeout); clearInterval(holdInterval); }

        // ==========================================
        // 🚀 手機與平板：觸控滑動手勢核心系統
        // ==========================================
        function setupTouchGestures() {
            const viewport = document.getElementById('carousel-viewport');
            let startX = 0;
            let currentX = 0;
            let swipeThreshold = 50; 

            viewport.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                dragOccurred = false;
            }, { passive: true });

            viewport.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX;
                const diffX = currentX - startX;
                if (Math.abs(diffX) > 10) {
                    dragOccurred = true; 
                }
            }, { passive: true });

            viewport.addEventListener('touchend', (e) => {
                if (!dragOccurred) return;

                const diffX = currentX - startX;
                if (Math.abs(diffX) >= swipeThreshold) {
                    if (diffX > 0) {
                        prevSlide(); 
                    } else {
                        nextSlide(); 
                    }
                }
                
                setTimeout(() => {
                    dragOccurred = false;
                }, 200);
            }, { passive: true });
        }

        function handleHover(isEnter, id) {
            if (isTouchDevice) return; 
            const submenu = document.getElementById(`submenu-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (isEnter) {
                submenu.style.maxHeight = '500px';
                chevron.classList.add('rotate-180');
            } else {
                submenu.style.maxHeight = '0';
                chevron.classList.remove('rotate-180');
            }
        }

        // 完美整合的點擊或懸停收合選單邏輯
        function toggleMenu(id) {
            const submenu = document.getElementById(`submenu-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            if (submenu.style.maxHeight === '500px') {
                submenu.style.maxHeight = '0';
                chevron.classList.remove('rotate-180');
            } else {
                submenu.style.maxHeight = '500px';
                chevron.classList.add('rotate-180');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (!sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            } else {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                sidebar.classList.remove('-translate-x-full');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
            
            ['com', 'market', 'resource', 'growth'].forEach(id => {
                const submenu = document.getElementById(`submenu-${id}`);
                if (submenu) submenu.style.maxHeight = '0';
                document.getElementById(`chevron-${id}`)?.classList.remove('rotate-180');
            });
        }

        function jumpToSection(index, elementId = null) {
            activeIndex = index;
            updateCarousel();
            enterCurrentSection();
            closeSidebar();
            if (elementId) {
                setTimeout(() => {
                    const targetEl = document.getElementById(elementId);
                    if (targetEl) {
                        const y = targetEl.getBoundingClientRect().top + window.pageYOffset - 100;
                        document.getElementById('content-container').scrollTo({top: y, behavior: 'smooth'});
                    }
                }, 400); 
            }
        }

        // ==========================================
        // 🚀 微調滾輪與觸控板：極致靈敏設定
        // ==========================================
        let wheelAccumulator = 0;
        let wheelResetTimeout = null;
        let isWheelLocked = false; 
        const scrollThreshold = 10; // 將閾值調降至極低的 10 像素，輕摸觸控板或滑鼠微滾即可觸發

        window.addEventListener('wheel', function(event) {
            if (!document.getElementById('content-container').classList.contains('hidden')) return; 
            
            // 減少鎖定狀態阻力，保持高頻快速響應
            if (isWheelLocked) return;

            // 決定主要的滑動軸 (水平或垂直)
            let delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
            
            // 累積滾動距離
            wheelAccumulator += delta;

            // 停止滾動一小段時間後重置累積器，避免手勢殘留
            clearTimeout(wheelResetTimeout);
            wheelResetTimeout = setTimeout(() => { wheelAccumulator = 0; }, 200);

            // 當累積距離達到 10px 極低門檻時，立刻靈敏觸發切換
            if (Math.abs(wheelAccumulator) >= scrollThreshold) {
                if (wheelAccumulator > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
                
                // 觸發切換後立即歸零
                wheelAccumulator = 0;

                // 將冷卻時間調回 150ms：完美平衡「一格一張」及「切換流暢感」，避免過度靈敏
                isWheelLocked = true;
                setTimeout(() => {
                    isWheelLocked = false;
                }, 150);
            }
        });

        window.addEventListener('keydown', function(event) {
            const isContentOpen = !document.getElementById('content-container').classList.contains('hidden');
            if (isContentOpen) {
                if (event.key === "ArrowLeft") switchContentSection(-1);
                else if (event.key === "ArrowRight") switchContentSection(1);
                else if (event.key === "Escape") goToHome();
            } else {
                if (event.key === "ArrowLeft") prevSlide();
                else if (event.key === "ArrowRight") nextSlide();
                else if (event.key === "Enter") enterCurrentSection();
            }
        });

        document.body.addEventListener('click', () => window.focus());

        function enterCurrentSection() {
            const item = SECTIONS[activeIndex];
            document.getElementById('current-section-title').innerText = currentLang === 'zh' ? item.title_zh : item.title_en;
            document.getElementById('current-section-index').innerText = `${activeIndex + 1} / ${SECTIONS.length}`;
            document.getElementById('content-display-box').innerHTML = currentLang === 'zh' ? item.content_zh : item.content_en;

            const landing = document.getElementById('landing-page');
            const content = document.getElementById('content-container');
            landing.style.transform = 'scale(0.9) translateZ(-100px)';
            landing.style.opacity = '0';
            
            setTimeout(() => {
                landing.classList.add('hidden');
                content.classList.remove('hidden');
                content.scrollTop = 0;
            }, 300);
        }

        function switchContentSection(direction) {
            let nextIdx = activeIndex + direction;
            if (nextIdx < 0) nextIdx = SECTIONS.length - 1;
            if (nextIdx >= SECTIONS.length) nextIdx = 0;
            activeIndex = nextIdx;
            
            updateCarousel();
            const item = SECTIONS[activeIndex];
            document.getElementById('current-section-title').innerText = currentLang === 'zh' ? item.title_zh : item.title_en;
            document.getElementById('current-section-index').innerText = `${activeIndex + 1} / ${SECTIONS.length}`;
            
            const displayBox = document.getElementById('content-display-box');
            displayBox.style.opacity = '0';
            setTimeout(() => {
                displayBox.innerHTML = currentLang === 'zh' ? item.content_zh : item.content_en;
                displayBox.style.opacity = '1';
                document.getElementById('content-container').scrollTop = 0; 
            }, 150);
        }

        function goToHome() {
            const landing = document.getElementById('landing-page');
            const content = document.getElementById('content-container');
            content.classList.add('hidden');
            landing.classList.remove('hidden');
            setTimeout(() => {
                landing.style.transform = 'scale(1) translateZ(0)';
                landing.style.opacity = '1';
                updateCarousel();
            }, 50);
        }

        // 明暗模式切換邏輯
        function toggleDarkMode() {
            const body = document.getElementById('app-body');
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            
            body.classList.toggle('light-mode');
            
            const isLight = body.classList.contains('light-mode');
            if (isLight) {
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        // 中英切換邏輯
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            
            // 更新切換按鈕文字
            document.getElementById('lang-toggle-btn').innerText = currentLang === 'zh' ? '中/EN' : 'EN/中';
            
            // 遍歷所有帶有 data-zh 和 data-en 的標籤，實現就地語系切換
            const elements = document.querySelectorAll('[data-zh]');
            elements.forEach(el => {
                el.innerText = currentLang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
            });
            
            // 重新初始化輪播大廳
            initCarousel();
            
            // 如果當前內頁是開啟狀態，同步更新內頁語言
            const isContentOpen = !document.getElementById('content-container').classList.contains('hidden');
            if (isContentOpen) {
                const item = SECTIONS[activeIndex];
                document.getElementById('current-section-title').innerText = currentLang === 'zh' ? item.title_zh : item.title_en;
                document.getElementById('content-display-box').innerHTML = currentLang === 'zh' ? item.content_zh : item.content_en;
            }
        }

        // 語音朗讀功能實裝 (Web Speech API)
        function speakCurrentCard() {
            if (!('speechSynthesis' in window)) {
                alert("抱歉，您的瀏覽器不支援語音合成功能！");
                return;
            }
            window.speechSynthesis.cancel();
            
            const currentItem = SECTIONS[activeIndex];
            let textToSpeak = "";
            let speechLang = "zh-TW";
            
            if (currentLang === 'zh') {
                textToSpeak = `當前章節：${currentItem.title_zh}。`;
                speechLang = "zh-TW";
            } else {
                textToSpeak = `Current section is: ${currentItem.title_en}.`;
                speechLang = "en-US";
            }
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = speechLang;
            utterance.rate = 1.0; 
            
            window.speechSynthesis.speak(utterance);
        }

        window.onload = function() {
            initCarousel();
            window.focus();
        };
    </script>
</body>
</html>
